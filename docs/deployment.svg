<text x="350" y="24" text-anchor="middle" class="section-title">部署架构</text><rect x="30" y="80" width="180" height="60" fill="#94a3b8" class="box-sm"/><text x="120" y="108" text-anchor="middle" class="label-white">开发者本地</text><text x="120" y="126" text-anchor="middle" class="label-sm">npm run build</text><line x1="210" y1="110" x2="240" y2="110" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/><rect x="240" y="80" width="180" height="60" fill="#1e293b" class="box-sm"/><text x="330" y="108" text-anchor="middle" class="label-white">GitHub</text><text x="330" y="126" text-anchor="middle" class="label-sm">git push → webhook</text><line x1="420" y1="110" x2="450" y2="110" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/><rect x="450" y="80" width="180" height="60" fill="#f97316" class="box-sm"/><text x="540" y="108" text-anchor="middle" class="label-white">Cloudflare Pages</text><text x="540" y="126" text-anchor="middle" class="label-sm">CDN 全球分发</text><rect x="450" y="170" width="90" height="32" fill="#fff7ed" class="box"/><text x="495" y="190" text-anchor="middle" class="label-sm">自动构建</text><rect x="545" y="170" width="90" height="32" fill="#fff7ed" class="box"/><text x="590" y="190" text-anchor="middle" class="label-sm">HTTPS</text><rect x="450" y="210" width="90" height="32" fill="#fff7ed" class="box"/><text x="495" y="230" text-anchor="middle" class="label-sm">CDN 分发</text><rect x="545" y="210" width="90" height="32" fill="#fff7ed" class="box"/><text x="590" y="230" text-anchor="middle" class="label-sm">自定义域名</text><rect x="240" y="180" width="180" height="60" fill="#a855f7" class="box-sm"/><text x="330" y="208" text-anchor="middle" class="label-white">Cloudflare Workers</text><text x="330" y="226" text-anchor="middle" class="label-sm">AI 代理 + 统计 API</text><path d="M 330 140 L 330 180" fill="none" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrow-purple)"/></svg>
