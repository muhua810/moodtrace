<text x="300" y="24" text-anchor="middle" class="section-title">AI 三级降级分析策略</text><rect x="140" y="50" width="320" height="50" fill="#6366f1" class="box"/><text x="300" y="80" text-anchor="middle" class="label-white">输入文本</text><line x1="300" y1="100" x2="300" y2="120" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow-indigo)"/><rect x="140" y="120" width="320" height="50" fill="#f97316" class="box"/><text x="300" y="144" text-anchor="middle" class="label-white">① Workers AI 代理 (DeepSeek)</text><text x="300" y="160" text-anchor="middle" class="label-sm">API Key 安全存储在环境变量</text><line x1="300" y1="170" x2="300" y2="195" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/><rect x="140" y="195" width="320" height="50" fill="#0ea5e9" class="box"/><text x="300" y="219" text-anchor="middle" class="label-white">② 用户自定义 API (可选)</text><text x="300" y="235" text-anchor="middle" class="label-sm">AES-256-GCM 加密存储 Key</text><line x1="300" y1="245" x2="300" y2="270" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/><rect x="140" y="270" width="320" height="50" fill="#22c55e" class="box"/><text x="300" y="294" text-anchor="middle" class="label-white">③ 本地关键词分析 (兜底)</text><text x="300" y="310" text-anchor="middle" class="label-sm">140+ 关键词 + Emoji + 分句加权 + 反讽</text><rect x="100" y="340" width="400" height="28" fill="#22c55e" class="box-sm"/><text x="300" y="358" text-anchor="middle" class="label-white">50ms 内响应 · 零配置 · 离线可用</text></svg>
