<text x="440" y="24" text-anchor="middle" class="section-title">情绪日历 · 系统分层架构</text><text x="60" y="58" text-anchor="start" class="section-title">表现层 (Presentation)</text><rect x="50" y="72" width="130" height="40" fill="#6366f1" class="box"/><text x="115" y="96" text-anchor="middle" class="label-white">HomePage</text><rect x="194" y="72" width="130" height="40" fill="#6366f1" class="box"/><text x="259" y="96" text-anchor="middle" class="label-white">RecordPage</text><rect x="338" y="72" width="130" height="40" fill="#6366f1" class="box"/><text x="403" y="96" text-anchor="middle" class="label-white">StatsPage</text><rect x="482" y="72" width="130" height="40" fill="#6366f1" class="box"/><text x="547" y="96" text-anchor="middle" class="label-white">ProfilePage</text><rect x="626" y="72" width="130" height="40" fill="#6366f1" class="box"/><text x="691" y="96" text-anchor="middle" class="label-white">NotFound</text><line x1="115" y1="112" x2="440" y2="150" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow-indigo)"/><line x1="259" y1="112" x2="440" y2="150" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow-indigo)"/><line x1="403" y1="112" x2="440" y2="150" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow-indigo)"/><line x1="547" y1="112" x2="440" y2="150" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow-indigo)"/><line x1="691" y1="112" x2="440" y2="150" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow-indigo)"/><text x="60" y="142" text-anchor="start" class="section-title">组件层 (Components)</text><rect x="40" y="150" width="800" height="44" fill="#0ea5e9" class="box"/><text x="60" y="176" text-anchor="middle" class="label-white">HeatmapCalendar</text><text x="175" y="176" text-anchor="middle" class="label-white">MonthCalendar</text><text x="290" y="176" text-anchor="middle" class="label-white">CaringCard</text><text x="405" y="176" text-anchor="middle" class="label-white">KeywordCloud</text><text x="520" y="176" text-anchor="middle" class="label-white">MiniTrend</text><text x="635" y="176" text-anchor="middle" class="label-white">ErrorBoundary</text><text x="750" y="176" text-anchor="middle" class="label-white">Onboarding</text><line x1="440" y1="194" x2="440" y2="240" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/><text x="60" y="232" text-anchor="start" class="section-title">服务层 (Services)</text><rect x="60" y="240" width="260" height="52" fill="#a855f7" class="box"/><text x="190" y="262" text-anchor="middle" class="label-white">emotionAnalyzer</text><text x="190" y="278" text-anchor="middle" class="label-sm">140+ 关键词 + 反讽 + 网语</text><rect x="340" y="240" width="200" height="52" fill="#a855f7" class="box"/><text x="440" y="262" text-anchor="middle" class="label-white">storage</text><text x="440" y="278" text-anchor="middle" class="label-sm">LocalStorage + AES-256-GCM</text><rect x="560" y="240" width="130" height="52" fill="#a855f7" class="box"/><text x="625" y="262" text-anchor="middle" class="label-white">reminder</text><text x="625" y="278" text-anchor="middle" class="label-sm">每日提醒</text><rect x="60" y="308" width="200" height="44" fill="#a855f7" class="box"/><text x="160" y="328" text-anchor="middle" class="label-white">backupService</text><text x="160" y="342" text-anchor="middle" class="label-sm">云端备份/恢复</text><rect x="280" y="308" width="200" height="44" fill="#a855f7" class="box"/><text x="380" y="328" text-anchor="middle" class="label-white">statisticalAnalyzer</text><text x="380" y="342" text-anchor="middle" class="label-sm">多维度统计分析</text><rect x="500" y="308" width="190" height="44" fill="#a855f7" class="box"/><text x="595" y="328" text-anchor="middle" class="label-white">apiService</text><text x="595" y="342" text-anchor="middle" class="label-sm">Worker API 代理</text><rect x="710" y="308" width="130" height="44" fill="#a855f7" class="box"/><text x="775" y="328" text-anchor="middle" class="label-white">demoData</text><text x="775" y="342" text-anchor="middle" class="label-sm">示例数据生成</text><line x1="170" y1="352" x2="170" y2="384" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)"/><line x1="600" y1="292" x2="600" y2="384" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrow-purple)"/><text x="60" y="376" text-anchor="start" class="section-title">数据层 (Data)</text><rect x="40" y="384" width="260" height="120" fill="#22c55e" class="box"/><text x="170" y="408" text-anchor="middle" class="label-white">关键词匹配引擎</text><text x="170" y="426" text-anchor="middle" class="label-sm">140+ 关键词 + 29 否定词</text><text x="170" y="442" text-anchor="middle" class="label-sm">Emoji 映射 + 分句加权</text><text x="170" y="458" text-anchor="middle" class="label-sm">反讽检测 + 网络用语</text><text x="170" y="478" text-anchor="middle" class="label-sm">50ms 内即时响应</text><rect x="320" y="384" width="180" height="80" fill="#22c55e" class="box"/><text x="410" y="414" text-anchor="middle" class="label-white">LocalStorage</text><text x="410" y="434" text-anchor="middle" class="label-sm">前端加密存储</text><text x="410" y="450" text-anchor="middle" class="label-sm">(AES-256-GCM)</text><rect x="520" y="384" width="320" height="120" fill="#f97316" class="box"/><text x="680" y="408" text-anchor="middle" class="label-white">Cloudflare Workers</text><text x="680" y="428" text-anchor="middle" class="label-sm">Workers AI 代理 (DeepSeek)</text><text x="680" y="444" text-anchor="middle" class="label-sm">/ 用户自定义 API (可选)</text><text x="680" y="464" text-anchor="middle" class="label-sm">三级降级: Worker → 用户API → 本地</text><text x="680" y="484" text-anchor="middle" class="label-sm">边缘计算 · KV 存储</text><line x1="440" y1="352" x2="410" y2="384" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)"/><line x1="595" y1="352" x2="680" y2="384" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrow-purple)"/></svg>
