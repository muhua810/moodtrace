<text x="360" y="24" text-anchor="middle" class="section-title">关怀等级算法 · getCareLevel()</text><rect x="250" y="50" width="220" height="44" fill="#6366f1" class="box"/><text x="360" y="76" text-anchor="middle" class="label-white">getCareLevel(days, mood)</text><line x1="360" y1="94" x2="160" y2="130" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow-indigo)"/><rect x="50" y="130" width="220" height="44" fill="#ef4444" class="box"/><text x="160" y="156" text-anchor="middle" class="label-white">very_negative</text><line x1="110" y1="174" x2="60" y2="210" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrow)"/><rect x="10" y="210" width="100" height="36" fill="#ef4444" class="box-sm"/><text x="60" y="232" text-anchor="middle" class="label-white">≥3天 → L3</text><line x1="160" y1="174" x2="160" y2="210" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrow)"/><rect x="110" y="210" width="100" height="36" fill="#f97316" class="box-sm"/><text x="160" y="232" text-anchor="middle" class="label-white">≥1天 → L2</text><line x1="210" y1="174" x2="260" y2="210" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrow)"/><rect x="210" y="210" width="100" height="36" fill="#f59e0b" class="box-sm"/><text x="260" y="232" text-anchor="middle" class="label-white">默认 → L1</text><line x1="360" y1="94" x2="560" y2="130" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow-indigo)"/><rect x="450" y="130" width="220" height="44" fill="#f97316" class="box"/><text x="560" y="156" text-anchor="middle" class="label-white">negative</text><line x1="510" y1="174" x2="460" y2="210" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrow)"/><rect x="410" y="210" width="100" height="36" fill="#ef4444" class="box-sm"/><text x="460" y="232" text-anchor="middle" class="label-white">≥5天 → L3</text><line x1="560" y1="174" x2="560" y2="210" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrow)"/><rect x="510" y="210" width="100" height="36" fill="#f97316" class="box-sm"/><text x="560" y="232" text-anchor="middle" class="label-white">≥3天 → L2</text><line x1="610" y1="174" x2="660" y2="210" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrow)"/><rect x="610" y="210" width="100" height="36" fill="#f59e0b" class="box-sm"/><text x="660" y="232" text-anchor="middle" class="label-white">≥2天 → L1</text><line x1="360" y1="94" x2="360" y2="310" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/><rect x="280" y="310" width="160" height="44" fill="#94a3b8" class="box"/><text x="360" y="336" text-anchor="middle" class="label-white">其他情绪 → 不显示</text><rect x="200" y="370" width="320" height="36" fill="#ef4444" class="box"/><text x="360" y="392" text-anchor="middle" class="label-white">⚠ 危机关键词（如"想死"）直接触发 Level 3</text></svg>
