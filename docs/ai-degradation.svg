<text x="250" y="24" text-anchor="middle" class="section-title">AI 多层降级策略</text><rect x="110" y="50" width="280" height="48" fill="#a855f7" class="box"/><text x="250" y="78" text-anchor="middle" class="label-white">analyzeEmotion(text)</text><line x1="250" y1="98" x2="250" y2="120" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrow-purple)"/><rect x="110" y="120" width="280" height="48" fill="#f97316" class="box"/><text x="250" y="148" text-anchor="middle" class="label-white">① Workers AI 代理 (DeepSeek)</text><line x1="400" y1="144" x2="450" y2="144" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)"/><rect x="450" y="124" width="100" height="40" fill="#22c55e" class="box-sm"/><text x="500" y="148" text-anchor="middle" class="label-white">✅ 返回结果</text><line x1="250" y1="168" x2="250" y2="190" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/><rect x="110" y="190" width="280" height="48" fill="#0ea5e9" class="box"/><text x="250" y="218" text-anchor="middle" class="label-white">② 用户自定义 API (可选)</text><line x1="400" y1="214" x2="450" y2="214" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)"/><rect x="450" y="194" width="100" height="40" fill="#22c55e" class="box-sm"/><text x="500" y="218" text-anchor="middle" class="label-white">✅ 返回结果</text><line x1="250" y1="238" x2="250" y2="260" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/><rect x="110" y="260" width="280" height="48" fill="#22c55e" class="box"/><text x="250" y="288" text-anchor="middle" class="label-white">③ 本地关键词分析 (兜底)</text><line x1="400" y1="284" x2="450" y2="284" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)"/><rect x="450" y="264" width="100" height="40" fill="#22c55e" class="box-sm"/><text x="500" y="288" text-anchor="middle" class="label-white">✅ 返回结果</text></svg>
