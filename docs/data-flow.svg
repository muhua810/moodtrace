<text x="430" y="24" text-anchor="middle" class="section-title">情绪日历 · 数据流</text><rect x="340" y="50" width="180" height="44" fill="#6366f1" class="box-sm"/><text x="430" y="76" text-anchor="middle" class="label-white">用户输入文本</text><rect x="340" y="120" width="180" height="44" fill="#94a3b8" class="box-sm"/><text x="430" y="146" text-anchor="middle" class="label-white">sanitizeInput()</text><text x="430" y="178" text-anchor="middle" class="label-sm">DOMPurify XSS 过滤</text><rect x="340" y="195" width="180" height="44" fill="#a855f7" class="box-sm"/><text x="430" y="221" text-anchor="middle" class="label-white">analyzeEmotion()</text><rect x="60" y="280" width="180" height="44" fill="#f97316" class="box-sm"/><text x="150" y="306" text-anchor="middle" class="label-white">Workers AI 代理</text><text x="150" y="338" text-anchor="middle" class="label-sm">POST /api/analyze</text><rect x="340" y="280" width="180" height="44" fill="#0ea5e9" class="box-sm"/><text x="430" y="306" text-anchor="middle" class="label-white">用户自定义 API</text><text x="430" y="338" text-anchor="middle" class="label-sm">AES 加密 Key</text><rect x="620" y="280" width="200" height="44" fill="#22c55e" class="box-sm"/><text x="720" y="306" text-anchor="middle" class="label-white">localAnalyze(text)</text><text x="720" y="338" text-anchor="middle" class="label-sm">140+ 关键词 + 分句加权</text><rect x="340" y="370" width="180" height="44" fill="#a855f7" class="box-sm"/><text x="430" y="396" text-anchor="middle" class="label-white">多层降级合并</text><text x="430" y="428" text-anchor="middle" class="label-sm">Worker → API → 本地</text><rect x="340" y="440" width="180" height="44" fill="#6366f1" class="box-sm"/><text x="430" y="466" text-anchor="middle" class="label-white">RecordPage 展示</text><line x1="430" y1="94" x2="430" y2="120" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/><line x1="430" y1="164" x2="430" y2="195" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/><path d="M 430 239 C 430 240, 150 240, 150 280" fill="none" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrow)"/><line x1="430" y1="239" x2="430" y2="280" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/><path d="M 430 239 C 430 240, 720 240, 720 280" fill="none" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow)"/><path d="M 150 324 C 150 340, 430 340, 430 370" fill="none" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrow)"/><line x1="430" y1="324" x2="430" y2="370" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/><path d="M 720 324 C 720 340, 430 340, 430 370" fill="none" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrow)"/><line x1="430" y1="414" x2="430" y2="440" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/><text x="430" y="490" text-anchor="middle" class="label-sm">用户保存 → LocalStorage (加密) → mood-record-updated 事件 → 刷新首页/统计</text></svg>
