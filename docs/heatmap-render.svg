<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 260" width="750" height="260" id="heatmap-render">
<defs>
  <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
    <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
  </filter>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
  </marker>
  <marker id="arrow-indigo" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#6366f1"/>
  </marker>
  <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
  </marker>
  <marker id="arrow-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#a855f7"/>
  </marker>
</defs>
<style>
  text { font-family: -apple-system, 'Segoe UI', 'Noto Sans SC', sans-serif; }
  .title { font-size: 13px; font-weight: 600; fill: #ffffff; }
  .label { font-size: 11px; font-weight: 500; fill: #1e293b; }
  .label-sm { font-size: 10px; fill: #64748b; }
  .label-white { font-size: 11px; font-weight: 500; fill: #ffffff; }
  .box { rx: 10; ry: 10; filter: url(#shadow); }
  .box-sm { rx: 8; ry: 8; filter: url(#shadow); }
  .section-title { font-size: 14px; font-weight: 700; fill: #1e293b; }
</style>
<text x="375" y="24" text-anchor="middle" class="section-title">情绪热力图渲染流程</text><rect x="30" y="60" width="150" height="44" fill="#6366f1" class="box-sm"/><text x="105" y="86" text-anchor="middle" class="label-white">year</text><text x="105" y="52" text-anchor="middle" class="label-sm">startOfYear → endOfYear</text><line x1="180" y1="82" x2="190" y2="82" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/><rect x="190" y="60" width="150" height="44" fill="#0ea5e9" class="box-sm"/><text x="265" y="86" text-anchor="middle" class="label-white">eachDayOfInterval</text><text x="265" y="52" text-anchor="middle" class="label-sm">生成每日日期</text><line x1="340" y1="82" x2="370" y2="82" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/><rect x="370" y="60" width="150" height="44" fill="#a855f7" class="box-sm"/><text x="445" y="86" text-anchor="middle" class="label-white">按周分组</text><text x="445" y="52" text-anchor="middle" class="label-sm">7 天一组</text><line x1="520" y1="82" x2="540" y2="82" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/><rect x="540" y="60" width="150" height="44" fill="#22c55e" class="box-sm"/><text x="615" y="86" text-anchor="middle" class="label-white">SVG 渲染</text><text x="615" y="52" text-anchor="middle" class="label-sm">12×12px rect/天</text><line x1="615" y1="104" x2="615" y2="130" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)"/><rect x="530" y="130" width="170" height="20" fill="#22c55e" class="box-sm"/><text x="625" y="144" text-anchor="middle" class="label-white">有记录 → 情绪颜色</text><rect x="530" y="154" width="170" height="20" fill="#94a3b8" class="box-sm"/><text x="625" y="168" text-anchor="middle" class="label-white">无记录 → 半透明</text><rect x="530" y="178" width="170" height="20" fill="#6366f1" class="box-sm"/><text x="625" y="192" text-anchor="middle" class="label-white">今天 → 靛蓝边框</text><rect x="530" y="202" width="170" height="20" fill="#64748b" class="box-sm"/><text x="625" y="216" text-anchor="middle" class="label-white">未来 → 禁用</text><rect x="530" y="226" width="170" height="20" fill="#0ea5e9" class="box-sm"/><text x="625" y="240" text-anchor="middle" class="label-white">Hover → Tooltip</text></svg>
