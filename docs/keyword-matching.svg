<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 680" width="780" height="680" id="keyword-matching">
<defs>
  <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
    <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
  </filter>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
  </marker>
  <marker id="arrow-indigo" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#6366f1"/>
  </marker>
  <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
  </marker>
  <marker id="arrow-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#a855f7"/>
  </marker>
</defs>
<style>
  text { font-family: -apple-system, 'Segoe UI', 'Noto Sans SC', sans-serif; }
  .title { font-size: 13px; font-weight: 600; fill: #ffffff; }
  .label { font-size: 11px; font-weight: 500; fill: #1e293b; }
  .label-sm { font-size: 10px; fill: #64748b; }
  .label-white { font-size: 11px; font-weight: 500; fill: #ffffff; }
  .box { rx: 10; ry: 10; filter: url(#shadow); }
  .box-sm { rx: 8; ry: 8; filter: url(#shadow); }
  .section-title { font-size: 14px; font-weight: 700; fill: #1e293b; }
</style>
<text x="390" y="24" text-anchor="middle" class="section-title">关键词匹配算法流程</text><rect x="250" y="50" width="280" height="40" fill="#6366f1" class="box-sm"/><text x="390" y="74" text-anchor="middle" class="label-white">输入文本 → toLowerCase()</text><line x1="390" y1="90" x2="390" y2="110" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/><rect x="250" y="110" width="280" height="40" fill="#ef4444" class="box-sm"/><text x="390" y="134" text-anchor="middle" class="label-white">检查危机关键词</text><text x="390" y="164" text-anchor="middle" class="label-sm">"想死"等 → 直接触发 Level 3</text><line x1="390" y1="150" x2="390" y2="175" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/><rect x="250" y="175" width="280" height="40" fill="#f97316" class="box-sm"/><text x="390" y="199" text-anchor="middle" class="label-white">反讽检测 (detectSarcasm)</text><text x="390" y="229" text-anchor="middle" class="label-sm">6 种模式匹配</text><line x1="390" y1="215" x2="390" y2="240" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/><rect x="250" y="240" width="280" height="40" fill="#0ea5e9" class="box-sm"/><text x="390" y="264" text-anchor="middle" class="label-white">分句 (splitClauses)</text><text x="390" y="294" text-anchor="middle" class="label-sm">按标点/空格分割子句</text><line x1="390" y1="280" x2="390" y2="305" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/><rect x="250" y="305" width="280" height="40" fill="#a855f7" class="box-sm"/><text x="390" y="329" text-anchor="middle" class="label-white">检测反转模式 (detectReversal)</text><text x="390" y="359" text-anchor="middle" class="label-sm">"虽然…但是…" → 后半句 2.5x</text><line x1="390" y1="345" x2="390" y2="375" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/><rect x="250" y="375" width="280" height="40" fill="#a855f7" class="box-sm"/><text x="390" y="399" text-anchor="middle" class="label-white">逐句分析 (analyzeClause)</text><text x="390" y="429" text-anchor="middle" class="label-sm">Emoji + 关键词 + 否定词 + 相对化</text><line x1="390" y1="415" x2="390" y2="450" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/><rect x="250" y="450" width="280" height="40" fill="#22c55e" class="box-sm"/><text x="390" y="474" text-anchor="middle" class="label-white">合并所有子句结果</text><text x="390" y="504" text-anchor="middle" class="label-sm">取 weight 最高的 score</text><line x1="390" y1="490" x2="390" y2="530" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/><rect x="250" y="530" width="280" height="40" fill="#6366f1" class="box-sm"/><text x="390" y="554" text-anchor="middle" class="label-white">返回情绪结果 + confidence</text><rect x="560" y="355" width="200" height="200" fill="#f1f5f9" class="box"/><text x="660" y="375" text-anchor="middle" class="section-title">analyzeClause 详情</text><text x="660" y="400" text-anchor="middle" class="label-sm">1. 中性关键词 → score=3</text><text x="660" y="422" text-anchor="middle" class="label-sm">2. Emoji 映射 (50+)</text><text x="660" y="444" text-anchor="middle" class="label-sm">3. 遍历 KEYWORD_RULES</text><text x="660" y="466" text-anchor="middle" class="label-sm">4. 否定词检测 (10字窗口)</text><text x="660" y="488" text-anchor="middle" class="label-sm">5. 相对化表达弱化</text><text x="660" y="510" text-anchor="middle" class="label-sm">6. 计算加权分数</text><path d="M 530 395 Q 545 395, 560 400" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/></svg>
